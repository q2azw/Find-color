<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이미지 팔레트 색상 찾기</title>

<style>

body{
background:#2b2b2b;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
padding:20px;
}

h1{
margin-bottom:10px;
}

.controls{
margin-bottom:15px;
}

#canvasContainer{
display:flex;
justify-content:center;
margin-top:20px;
}

canvas{
border:1px solid #555;
cursor:crosshair;
max-width:90vw;
image-rendering:pixelated;
}

.colorRow{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}

.colorBox{
width:80px;
height:80px;
border:3px solid #444;
}

.palette{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
}

.paletteColor{
width:30px;
height:30px;
margin:2px;
border:2px solid #333;
}

.highlight{
border:3px solid yellow !important;
}

</style>
</head>

<body>

<h1>이미지 → 팔레트 색상 찾기</h1>

<div class="controls">

이미지 업로드  
<input type="file" id="imageUpload">

<br><br>

팔레트 업로드  
<input type="file" id="paletteUpload">

</div>

<div class="colorRow">

<div>
선택한 색
<div id="selectedColor" class="colorBox"></div>
</div>

<div>
가장 가까운 팔레트 색
<div id="closestColor" class="colorBox"></div>
</div>

</div>

<div class="palette" id="paletteList"></div>

<div id="canvasContainer">
<canvas id="canvas"></canvas>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const hiddenCanvas=document.createElement("canvas")
const hiddenCtx=hiddenCanvas.getContext("2d")

let img=new Image()
let palette=[]

let scale=1
let offsetX=0
let offsetY=0

let dragging=false
let dragStartX=0
let dragStartY=0


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()

ctx.translate(offsetX,offsetY)
ctx.scale(scale,scale)

ctx.drawImage(img,0,0)

ctx.restore()

}


function distance(a,b){

return Math.sqrt(
(a.r-b.r)**2+
(a.g-b.g)**2+
(a.b-b.b)**2
)

}


function findClosest(color){

let best=null
let bestDist=999999

palette.forEach(p=>{

let d=distance(color,p)

if(d<bestDist){
bestDist=d
best=p
}

})

return best

}


function updatePaletteHighlight(color){

document.querySelectorAll(".paletteColor").forEach(el=>{
el.classList.remove("highlight")
})

palette.forEach((p,i)=>{

if(p.r===color.r && p.g===color.g && p.b===color.b){

document.querySelectorAll(".paletteColor")[i].classList.add("highlight")

}

})

}


canvas.addEventListener("click",e=>{

const x=(e.offsetX-offsetX)/scale
const y=(e.offsetY-offsetY)/scale

const data=hiddenCtx.getImageData(x,y,1,1).data

const color={
r:data[0],
g:data[1],
b:data[2]
}

document.getElementById("selectedColor").style.background=
`rgb(${color.r},${color.g},${color.b})`

const closest=findClosest(color)

if(closest){

document.getElementById("closestColor").style.background=
`rgb(${closest.r},${closest.g},${closest.b})`

updatePaletteHighlight(closest)

}

})


canvas.addEventListener("wheel",e=>{

e.preventDefault()

if(e.deltaY<0){
scale*=1.1
}else{
scale*=0.9
}

draw()

})


canvas.addEventListener("mousedown",e=>{

dragging=true
dragStartX=e.offsetX-offsetX
dragStartY=e.offsetY-offsetY

})


canvas.addEventListener("mouseup",()=>{

dragging=false

})


canvas.addEventListener("mousemove",e=>{

if(dragging){

offsetX=e.offsetX-dragStartX
offsetY=e.offsetY-dragStartY

draw()

}

})


document.getElementById("imageUpload").addEventListener("change",e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(ev){

img.onload=function(){

canvas.width=img.width*2
canvas.height=img.height*2

hiddenCanvas.width=img.width
hiddenCanvas.height=img.height

hiddenCtx.drawImage(img,0,0)

scale=1
offsetX=0
offsetY=0

draw()

}

img.src=ev.target.result

}

reader.readAsDataURL(file)

})


document.getElementById("paletteUpload").addEventListener("change",e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(ev){

const image=new Image()

image.onload=function(){

const c=document.createElement("canvas")
const x=c.getContext("2d")

c.width=image.width
c.height=image.height

x.drawImage(image,0,0)

const data=x.getImageData(0,0,c.width,c.height).data

const set=new Set()

palette=[]

for(let i=0;i<data.length;i+=4){

const r=data[i]
const g=data[i+1]
const b=data[i+2]

const key=`${r},${g},${b}`

if(!set.has(key)){

set.add(key)

palette.push({r,g,b})

}

}

displayPalette()

}

image.src=ev.target.result

}

reader.readAsDataURL(file)

})


function displayPalette(){

const list=document.getElementById("paletteList")

list.innerHTML=""

palette.forEach(c=>{

const div=document.createElement("div")

div.className="paletteColor"

div.style.background=`rgb(${c.r},${c.g},${c.b})`

list.appendChild(div)

})

}

</script>

</body>
</html>
