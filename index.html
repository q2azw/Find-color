```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이미지 색상 → 팔레트 색 찾기</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
color:#000;
text-align:center;
padding:30px;
transition:0.3s;
}

.dark{
background:#2b2b2b;
color:#eee;
}

#themeToggle{
position:fixed;
top:15px;
right:20px;
padding:8px 14px;
cursor:pointer;
border-radius:6px;
border:none;
background:#444;
color:white;
}

.dark #themeToggle{
background:#ddd;
color:black;
}

#imagePreview{
width:700px;
max-width:90vw;
border:2px solid #aaa;
border-radius:10px;
cursor:crosshair;
image-rendering:pixelated;
margin-top:20px;
}

.colorContainer{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.colorBlock{
display:flex;
flex-direction:column;
align-items:center;
}

.colorBox{
width:120px;
height:120px;
border-radius:10px;
border:2px solid #333;
}

#paletteGrid{
display:grid;
grid-template-columns:repeat(auto-fill,30px);
justify-content:center;
gap:4px;
margin-top:20px;
}

.paletteColor{
width:30px;
height:30px;
border:1px solid #000;
}

.highlight{
border:3px solid yellow;
}

.dark .paletteColor{
border:1px solid #777;
}

</style>
</head>

<body>

<button id="themeToggle">다크모드</button>

<h1>이미지 색상 → 팔레트 색 찾기</h1>

<h3>팔레트 업로드 (.aco)</h3>
<input type="file" id="paletteUpload">

<h3>팔레트 색 목록</h3>
<div id="paletteGrid"></div>

<div class="colorContainer">

<div class="colorBlock">
<h3>선택한 색</h3>
<div id="selectedColor" class="colorBox"></div>
<div id="selectedHex"></div>
</div>

<div class="colorBlock">
<h3>가장 가까운 팔레트 색</h3>
<div id="closestColor" class="colorBox"></div>
<div id="closestHex"></div>
</div>

</div>

<h3>이미지 업로드</h3>
<input type="file" id="imageUpload" accept="image/*">

<br>

<img id="imagePreview">

<script>

let palette=[]
let paletteElements=[]

const imageUpload=document.getElementById("imageUpload")
const paletteUpload=document.getElementById("paletteUpload")
const imagePreview=document.getElementById("imagePreview")

const selectedColor=document.getElementById("selectedColor")
const closestColor=document.getElementById("closestColor")

const selectedHex=document.getElementById("selectedHex")
const closestHex=document.getElementById("closestHex")

const paletteGrid=document.getElementById("paletteGrid")

const themeToggle=document.getElementById("themeToggle")

themeToggle.onclick=function(){

document.body.classList.toggle("dark")

themeToggle.innerText=
document.body.classList.contains("dark")
?"라이트모드":"다크모드"

}

imageUpload.addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){

const img=new Image()

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

const scale=4

canvas.width=img.width*scale
canvas.height=img.height*scale

ctx.imageSmoothingEnabled=false

ctx.drawImage(img,0,0,canvas.width,canvas.height)

imagePreview.src=canvas.toDataURL()

}

img.src=e.target.result

}

reader.readAsDataURL(file)

})

paletteUpload.addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){

palette=parseACO(e.target.result)

displayPalette()

alert("팔레트 색 "+palette.length+"개 로드됨")

}

reader.readAsArrayBuffer(file)

})

function parseACO(buffer){

const view=new DataView(buffer)

let colors=[]

let count=view.getUint16(2)

let offset=4

for(let i=0;i<count;i++){

offset+=2

let r=view.getUint16(offset)/256
offset+=2

let g=view.getUint16(offset)/256
offset+=2

let b=view.getUint16(offset)/256
offset+=2

offset+=2

colors.push({r,g,b})

}

return colors

}

function displayPalette(){

paletteGrid.innerHTML=""
paletteElements=[]

palette.forEach(color=>{

const hex=rgbToHex(color.r,color.g,color.b)

const div=document.createElement("div")
div.className="paletteColor"
div.style.background=hex
div.title=hex

paletteGrid.appendChild(div)

paletteElements.push(div)

})

}

imagePreview.addEventListener("click",function(e){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=imagePreview.width
canvas.height=imagePreview.height

ctx.drawImage(imagePreview,0,0,canvas.width,canvas.height)

const rect=imagePreview.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const pixel=ctx.getImageData(x,y,1,1).data

const r=pixel[0]
const g=pixel[1]
const b=pixel[2]

const hex=rgbToHex(r,g,b)

selectedColor.style.background=hex
selectedHex.innerText=hex

findClosestColor(r,g,b)

})

function rgbToHex(r,g,b){

return "#"+[r,g,b].map(x=>{
const hex=Math.round(x).toString(16)
return hex.length===1?"0"+hex:hex
}).join("")

}

function findClosestColor(r,g,b){

if(palette.length===0) return

let closestIndex=0
let minDist=999999

palette.forEach((color,i)=>{

const dist=Math.sqrt(
(r-color.r)*(r-color.r)+
(g-color.g)*(g-color.g)+
(b-color.b)*(b-color.b)
)

if(dist<minDist){

minDist=dist
closestIndex=i

}

})

const closest=palette[closestIndex]

const hex=rgbToHex(closest.r,closest.g,closest.b)

closestColor.style.background=hex
closestHex.innerText=hex

paletteElements.forEach(el=>el.classList.remove("highlight"))

paletteElements[closestIndex].classList.add("highlight")

}

</script>

</body>
</html>
