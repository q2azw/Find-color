<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>이미지 색상 팔레트 매칭 도구</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
}

canvas{
border:1px solid #444;
cursor:crosshair;
}

.palette{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:10px;
justify-content:center;
}

.colorBox{
width:40px;
height:40px;
border:2px solid #333;
}

.match{
border:4px solid yellow;
}
</style>
</head>

<body>

<h2>이미지 색상 → 팔레트 색 찾기</h2>

<p>이미지를 업로드하고 원하는 색을 클릭하세요</p>

<input type="file" id="imageUpload">

<br><br>

<canvas id="canvas"></canvas>

<h3>선택한 색상</h3>
<div id="picked" style="width:60px;height:60px;margin:auto;"></div>

<h3>가장 가까운 팔레트 색상</h3>
<div id="closest" style="width:60px;height:60px;margin:auto;"></div>

<p id="delta"></p>

<h3>팔레트 업로드 (.aco .ase .json)</h3>

<input type="file" id="paletteUpload">

<div class="palette" id="palette"></div>

<script>

let palette = []

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

document.getElementById("imageUpload").onchange = e=>{

let file = e.target.files[0]
let img = new Image()

img.onload = ()=>{
canvas.width = img.width
canvas.height = img.height
ctx.drawImage(img,0,0)
}

img.src = URL.createObjectURL(file)

}

canvas.onclick = e=>{

let rect = canvas.getBoundingClientRect()

let x = e.clientX - rect.left
let y = e.clientY - rect.top

let data = ctx.getImageData(x,y,1,1).data

let color = {
r:data[0],
g:data[1],
b:data[2]
}

showPicked(color)
findClosest(color)

}

function showPicked(c){

let el = document.getElementById("picked")

el.style.background =
`rgb(${c.r},${c.g},${c.b})`

}

function dist(c1,c2){

return Math.sqrt(
(c1.r-c2.r)**2 +
(c1.g-c2.g)**2 +
(c1.b-c2.b)**2
)

}

function findClosest(target){

let best=null
let min=999999

palette.forEach(c=>{

let d=dist(target,c)

if(d<min){
min=d
best=c
}

})

if(!best)return

document.getElementById("closest").style.background=
`rgb(${best.r},${best.g},${best.b})`

document.getElementById("delta").innerText =
"색상 차이 값: "+min.toFixed(2)

highlight(best)

}

function highlight(c){

document.querySelectorAll(".colorBox")
.forEach(b=>b.classList.remove("match"))

palette.forEach((p,i)=>{

if(p===c){

document.querySelectorAll(".colorBox")[i]
.classList.add("match")

}

})

}

function addPaletteColor(c){

palette.push(c)

let div=document.createElement("div")

div.className="colorBox"

div.style.background =
`rgb(${c.r},${c.g},${c.b})`

document.getElementById("palette")
.appendChild(div)

}

document.getElementById("paletteUpload")
.onchange = async e=>{

let file = e.target.files[0]

let buf = await file.arrayBuffer()

if(file.name.endsWith(".aco")){
parseACO(buf)
}

if(file.name.endsWith(".ase")){
parseASE(buf)
}

if(file.name.endsWith(".json")){
let text = await file.text()
let arr = JSON.parse(text)
arr.forEach(addPaletteColor)
}

}

function parseACO(buffer){

let view=new DataView(buffer)

let count=view.getUint16(2)

let offset=4

for(let i=0;i<count;i++){

let r=view.getUint16(offset+2)/256
let g=view.getUint16(offset+4)/256
let b=view.getUint16(offset+6)/256

offset+=10

addPaletteColor({
r:Math.round(r),
g:Math.round(g),
b:Math.round(b)
})

}

}

function parseASE(buffer){

let view=new DataView(buffer)

let str=""

for(let i=0;i<buffer.byteLength;i++){
str+=String.fromCharCode(view.getUint8(i))
}

let matches=[...str.matchAll(/RGB(.{12})/g)]

matches.forEach(m=>{

let dv=new DataView(
new Uint8Array(
m[1].split("").map(c=>c.charCodeAt(0))
).buffer
)

let r=dv.getFloat32(0)*255
let g=dv.getFloat32(4)*255
let b=dv.getFloat32(8)*255

addPaletteColor({
r:Math.round(r),
g:Math.round(g),
b:Math.round(b)
})

})

}

</script>

</body>
</html>
