<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Palette Image Viewer</title>

<style>
body{
    font-family:sans-serif;
    background:#1e1e1e;
    color:white;
}

#viewer{
    width:800px;
    height:600px;
    border:1px solid #444;
    overflow:hidden;
    position:relative;
    cursor:grab;
}

canvas{
    position:absolute;
}

.palette{
    display:flex;
    flex-wrap:wrap;
    margin-top:10px;
}

.color{
    width:80px;
    margin:4px;
    text-align:center;
    font-size:12px;
}

.swatch{
    width:60px;
    height:30px;
    margin:auto;
    border:1px solid #000;
}

.highlight{
    outline:3px solid yellow;
}
</style>

</head>
<body>

<h2>이미지 + 팔레트 뷰어</h2>

<input type="file" id="imageInput">
<input type="file" id="acoInput">

<div id="viewer">
<canvas id="canvas"></canvas>
</div>

<div class="palette" id="palette"></div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

ctx.imageSmoothingEnabled = true
ctx.imageSmoothingQuality = "high"

let img = new Image()

let scale = 4
let offsetX = 0
let offsetY = 0

let dragging=false
let startX=0
let startY=0

let palette=[]

document.getElementById("imageInput").addEventListener("change", e=>{
    const file=e.target.files[0]
    const url=URL.createObjectURL(file)
    img.src=url
})

img.onload=()=>{
    canvas.width = img.width * 4
    canvas.height = img.height * 4
    draw()
}

function draw(){

    ctx.setTransform(scale,0,0,scale,offsetX,offsetY)
    ctx.clearRect(-offsetX/scale,-offsetY/scale,canvas.width,canvas.height)
    ctx.drawImage(img,0,0)

}

canvas.addEventListener("wheel",e=>{

    e.preventDefault()

    const zoom = e.deltaY < 0 ? 1.1 : 0.9

    scale*=zoom

    draw()

})

canvas.addEventListener("mousedown",e=>{

    dragging=true
    startX=e.clientX-offsetX
    startY=e.clientY-offsetY

})

window.addEventListener("mouseup",()=>{
    dragging=false
})

window.addEventListener("mousemove",e=>{

    if(!dragging)return

    offsetX=e.clientX-startX
    offsetY=e.clientY-startY

    draw()

})

canvas.addEventListener("click",e=>{

    const rect=canvas.getBoundingClientRect()

    const x=Math.floor((e.clientX-rect.left-offsetX)/scale)
    const y=Math.floor((e.clientY-rect.top-offsetY)/scale)

    const pixel=ctx.getImageData(x,y,1,1).data

    const r=pixel[0]
    const g=pixel[1]
    const b=pixel[2]

    highlightClosest(r,g,b)

})

function highlightClosest(r,g,b){

    let best=null
    let bestDist=999999

    palette.forEach((c,i)=>{

        const dr=c.r-r
        const dg=c.g-g
        const db=c.b-b

        const dist=dr*dr+dg*dg+db*db

        if(dist<bestDist){
            bestDist=dist
            best=i
        }

    })

    document.querySelectorAll(".color").forEach(e=>e.classList.remove("highlight"))

    if(best!==null){
        document.querySelectorAll(".color")[best].classList.add("highlight")
    }

}

document.getElementById("acoInput").addEventListener("change",e=>{

    const file=e.target.files[0]
    const reader=new FileReader()

    reader.onload=function(){

        parseACO(reader.result)

    }

    reader.readAsArrayBuffer(file)

})

function parseACO(buffer){

    palette=[]

    const view=new DataView(buffer)

    const count=view.getUint16(2)

    let offset=4

    for(let i=0;i<count;i++){

        const space=view.getUint16(offset); offset+=2

        const r=view.getUint16(offset)/256; offset+=2
        const g=view.getUint16(offset)/256; offset+=2
        const b=view.getUint16(offset)/256; offset+=2

        offset+=2

        palette.push({
            r:Math.round(r),
            g:Math.round(g),
            b:Math.round(b),
            name:""
        })

    }

    if(offset < buffer.byteLength){

        const count2=view.getUint16(offset+2)

        offset+=4

        for(let i=0;i<count2;i++){

            offset+=2

            offset+=8

            const len=view.getUint16(offset); offset+=2

            let name=""

            for(let c=0;c<len-1;c++){

                name+=String.fromCharCode(view.getUint16(offset))
                offset+=2

            }

            offset+=2

            if(palette[i]) palette[i].name=name

        }

    }

    renderPalette()

}

function renderPalette(){

    const div=document.getElementById("palette")
    div.innerHTML=""

    palette.forEach(c=>{

        const d=document.createElement("div")
        d.className="color"

        const sw=document.createElement("div")
        sw.className="swatch"
        sw.style.background=`rgb(${c.r},${c.g},${c.b})`

        const name=document.createElement("div")
        name.textContent=c.name || `${c.r},${c.g},${c.b}`

        d.appendChild(sw)
        d.appendChild(name)

        div.appendChild(d)

    })

}

</script>

</body>
</html>
