<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이미지 색상 팔레트 매칭 도구</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f5f5f5;
text-align:center;
padding:30px;
}

h1{
margin-bottom:20px;
}

.section{
margin:20px 0;
}

#imagePreview{
max-width:600px;
max-height:600px;
border:2px solid #ccc;
border-radius:10px;
cursor:crosshair;
}

.colorBox{
width:120px;
height:120px;
border-radius:10px;
border:2px solid #333;
margin:10px auto;
}

.label{
font-weight:bold;
margin-top:10px;
}

.fileLabel{
display:block;
margin-bottom:5px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>이미지 색상 → 팔레트 색 찾기</h1>

<div class="section">

<label class="fileLabel">이미지 업로드</label>
<input type="file" id="imageUpload" accept="image/*">

<br><br>

<img id="imagePreview">

</div>


<div class="section">

<div class="label">선택한 색상</div>
<div id="selectedColor" class="colorBox"></div>
<div id="selectedHex"></div>

</div>


<div class="section">

<div class="label">가장 가까운 팔레트 색상</div>
<div id="closestColor" class="colorBox"></div>
<div id="closestHex"></div>

</div>


<div class="section">

<label class="fileLabel">팔레트 업로드 (.aco .ase .json)</label>
<input type="file" id="paletteUpload">

</div>


<script>

let palette=[]

const imageUpload=document.getElementById("imageUpload")
const paletteUpload=document.getElementById("paletteUpload")
const imagePreview=document.getElementById("imagePreview")

const selectedColor=document.getElementById("selectedColor")
const closestColor=document.getElementById("closestColor")

const selectedHex=document.getElementById("selectedHex")
const closestHex=document.getElementById("closestHex")


imageUpload.addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){
imagePreview.src=e.target.result
}

reader.readAsDataURL(file)

})


paletteUpload.addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){

try{

palette=JSON.parse(e.target.result)

}catch{

alert("팔레트 파일을 읽을 수 없습니다.")

}

}

reader.readAsText(file)

})


imagePreview.addEventListener("click",function(e){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=imagePreview.width
canvas.height=imagePreview.height

ctx.drawImage(imagePreview,0,0,canvas.width,canvas.height)

const rect=imagePreview.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const pixel=ctx.getImageData(x,y,1,1).data

const r=pixel[0]
const g=pixel[1]
const b=pixel[2]

const hex=rgbToHex(r,g,b)

selectedColor.style.background=hex
selectedHex.innerText=hex

findClosestColor(r,g,b)

})


function rgbToHex(r,g,b){

return "#"+[r,g,b].map(x=>{

const hex=x.toString(16)
return hex.length===1?"0"+hex:hex

}).join("")

}


function findClosestColor(r,g,b){

if(palette.length===0) return

let closest=null
let minDist=999999

palette.forEach(color=>{

const cr=color.r
const cg=color.g
const cb=color.b

const dist=Math.sqrt(

(r-cr)*(r-cr)+
(g-cg)*(g-cg)+
(b-cb)*(b-cb)

)

if(dist<minDist){

minDist=dist
closest=color

}

})

if(closest){

const hex=rgbToHex(closest.r,closest.g,closest.b)

closestColor.style.background=hex
closestHex.innerText=hex

}

}

</script>

</body>
</html>
