<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Palette Color Finder</title>

<style>
body{
background:#2b2b2b;
color:white;
font-family:sans-serif;
text-align:center;
}

input{
margin:10px;
}

canvas{
border:1px solid #555;
cursor:grab;
}

#paletteColors{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

.colorBox{
width:40px;
height:40px;
margin:3px;
border:2px solid #333;
}

.highlight{
border:3px solid yellow;
}

#closest{
display:flex;
justify-content:center;
margin-top:10px;
}

#closest .colorBox{
width:50px;
height:50px;
}
</style>
</head>

<body>

<h2>Palette Color Finder</h2>

<input type="file" id="paletteUpload">
<input type="file" id="imageUpload">

<h3>Palette Colors</h3>
<div id="paletteColors"></div>

<h3>Closest Palette Color</h3>
<div id="closest"></div>

<h3>Image</h3>
<canvas id="canvas"></canvas>

<script>

let palette=[]
let img=new Image()

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let scale=1
let offsetX=0
let offsetY=0
let dragging=false
let startX,startY

function distance(a,b){
return Math.sqrt(
Math.pow(a.r-b.r,2)+
Math.pow(a.g-b.g,2)+
Math.pow(a.b-b.b,2)
)
}

function rgbToCss(c){
return `rgb(${c.r},${c.g},${c.b})`
}

function getClosest(color){

let best=null
let bestDist=999999

for(let p of palette){

let d=distance(color,p)

if(d<bestDist){
bestDist=d
best=p
}
}

return best
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.imageSmoothingEnabled=true
ctx.imageSmoothingQuality="high"

ctx.save()
ctx.translate(offsetX,offsetY)
ctx.scale(scale,scale)
ctx.drawImage(img,0,0)
ctx.restore()

}

canvas.addEventListener("mousedown",e=>{
dragging=true
startX=e.offsetX-offsetX
startY=e.offsetY-offsetY
canvas.style.cursor="grabbing"
})

canvas.addEventListener("mouseup",()=>{
dragging=false
canvas.style.cursor="grab"
})

canvas.addEventListener("mousemove",e=>{
if(dragging){
offsetX=e.offsetX-startX
offsetY=e.offsetY-startY
draw()
}
})

canvas.addEventListener("wheel",e=>{

e.preventDefault()

let zoom=1.1

if(e.deltaY>0) zoom=0.9

scale*=zoom

draw()

})

canvas.addEventListener("click",e=>{

let x=(e.offsetX-offsetX)/scale
let y=(e.offsetY-offsetY)/scale

let data=ctx.getImageData(x,y,1,1).data

let selected={
r:data[0],
g:data[1],
b:data[2]
}

let closest=getClosest(selected)

displayClosest(closest)

})

function displayClosest(color){

let div=document.getElementById("closest")
div.innerHTML=""

let box=document.createElement("div")
box.className="colorBox highlight"
box.style.background=rgbToCss(color)

div.appendChild(box)

}

document.getElementById("paletteUpload").onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

let image=new Image()

image.onload=function(){

let c=document.createElement("canvas")
let x=c.getContext("2d")

c.width=image.width
c.height=image.height

x.drawImage(image,0,0)

let data=x.getImageData(0,0,c.width,c.height).data

palette=[]

for(let i=0;i<data.length;i+=16){

palette.push({
r:data[i],
g:data[i+1],
b:data[i+2]
})

}

displayPalette()

}

image.src=ev.target.result
}

reader.readAsDataURL(file)

}

function displayPalette(){

let div=document.getElementById("paletteColors")
div.innerHTML=""

palette.forEach(c=>{

let box=document.createElement("div")
box.className="colorBox"
box.style.background=rgbToCss(c)

div.appendChild(box)

})

}

document.getElementById("imageUpload").onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

img.onload=function(){

canvas.width=img.width*2
canvas.height=img.height*2

scale=1
offsetX=0
offsetY=0

draw()

}

img.src=ev.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
