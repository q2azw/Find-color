<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이미지 색상 → 팔레트 색 찾기</title>

<style>

body{
font-family:Arial;
background:#1e1e1e;
color:white;
text-align:center;
padding:30px;
}

h1{
margin-bottom:20px;
}

#mainContainer{
display:flex;
justify-content:center;
gap:40px;
align-items:flex-start;
}

#leftPanel{
display:flex;
flex-direction:column;
align-items:center;
}

#rightPanel{
display:flex;
flex-direction:column;
align-items:center;
}

#imagePreview{
width:700px;
max-width:90vw;
border:2px solid #666;
border-radius:10px;
cursor:crosshair;
image-rendering:pixelated;
margin-top:10px;
}

.colorBox{
width:120px;
height:120px;
margin:auto;
border-radius:10px;
border:2px solid #aaa;
}

/* ⭐ 여기만 수정됨 */
#paletteGrid{
display:grid;
grid-template-columns:repeat(10,30px);
gap:4px;
margin-top:20px;
}

.paletteColor{
width:30px;
height:30px;
border:2px solid black;
box-sizing:border-box;
}

.highlight{
border:2px solid yellow !important;
}

</style>
</head>

<body>

<h1>이미지 색상 → 팔레트 색 찾기</h1>

<div id="mainContainer">

<div id="leftPanel">

<h3>팔레트 업로드 (.aco)</h3>
<input type="file" id="paletteUpload">

<h3>팔레트 색 목록</h3>
<div id="paletteGrid"></div>

<h3>선택한 색</h3>
<div id="selectedColor" class="colorBox"></div>
<div id="selectedHex"></div>

<h3>가장 가까운 팔레트 색</h3>
<div id="closestColor" class="colorBox"></div>
<div id="closestHex"></div>

</div>

<div id="rightPanel">

<h3>이미지 업로드</h3>
<input type="file" id="imageUpload" accept="image/*">

<img id="imagePreview">

</div>

</div>

<script>

let palette=[]

const imageUpload=document.getElementById("imageUpload")
const paletteUpload=document.getElementById("paletteUpload")
const imagePreview=document.getElementById("imagePreview")

const selectedColor=document.getElementById("selectedColor")
const closestColor=document.getElementById("closestColor")

const selectedHex=document.getElementById("selectedHex")
const closestHex=document.getElementById("closestHex")

const paletteGrid=document.getElementById("paletteGrid")

imageUpload.addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){

const img=new Image()

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

const scale=4

canvas.width=img.width*scale
canvas.height=img.height*scale

ctx.imageSmoothingEnabled=false

ctx.drawImage(img,0,0,canvas.width,canvas.height)

imagePreview.src=canvas.toDataURL()

}

img.src=e.target.result

}

reader.readAsDataURL(file)

})

paletteUpload.addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){

palette=parseACO(e.target.result)

displayPalette()

alert("팔레트 색 "+palette.length+"개 로드됨")

}

reader.readAsArrayBuffer(file)

})

function parseACO(buffer){

const view=new DataView(buffer)

let colors=[]

let count=view.getUint16(2)

let offset=4

for(let i=0;i<count;i++){

offset+=2

let r=Math.round(view.getUint16(offset)/256)
offset+=2

let g=Math.round(view.getUint16(offset)/256)
offset+=2

let b=Math.round(view.getUint16(offset)/256)
offset+=2

offset+=2

colors.push({r,g,b})

}

return colors

}

function displayPalette(){

paletteGrid.innerHTML=""

palette.forEach(color=>{

const hex=rgbToHex(color.r,color.g,color.b)

const div=document.createElement("div")
div.className="paletteColor"
div.style.background=hex
div.title=hex

paletteGrid.appendChild(div)

})

}

imagePreview.addEventListener("click",function(e){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=imagePreview.width
canvas.height=imagePreview.height

ctx.drawImage(imagePreview,0,0,canvas.width,canvas.height)

const rect=imagePreview.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const pixel=ctx.getImageData(x,y,1,1).data

const r=Math.round(pixel[0])
const g=Math.round(pixel[1])
const b=Math.round(pixel[2])

const hex=rgbToHex(r,g,b)

selectedColor.style.background=hex
selectedHex.innerText=hex

findClosestColor(r,g,b)

})

function rgbToHex(r,g,b){

return "#"+[r,g,b].map(x=>{
const hex=Math.round(x).toString(16)
return hex.length===1?"0"+hex:hex
}).join("")

}

function findClosestColor(r,g,b){

if(palette.length===0) return

let closest=null
let minDist=999999
let closestIndex=-1

palette.forEach((color,index)=>{

const dist=Math.sqrt(
(r-color.r)*(r-color.r)+
(g-color.g)*(g-color.g)+
(b-color.b)*(b-color.b)
)

if(dist<minDist){

minDist=dist
closest=color
closestIndex=index

}

})

if(closest){

const hex=rgbToHex(closest.r,closest.g,closest.b)

closestColor.style.background=hex
closestHex.innerText=hex

document.querySelectorAll(".paletteColor").forEach((el,i)=>{
el.classList.remove("highlight")
})

if(closestIndex>=0){
document.querySelectorAll(".paletteColor")[closestIndex].classList.add("highlight")
}

}

}

</script>

</body>
</html>
